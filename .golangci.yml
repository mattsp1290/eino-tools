version: "2"

run:
  go: "1.25"
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    - nilerr
    - errorlint
    - gosec
    - copyloopvar

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    revive:
      rules:
        - name: var-naming
        - name: exported
          disabled: true
        - name: error-return
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: errorf
        - name: indent-error-flow
        - name: superfluous-else
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
    gosec:
      excludes:
        - G104
    errcheck:
      check-type-assertions: true
      check-blank: false

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/mattsp1290/eino-tools

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

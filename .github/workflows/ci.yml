name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: Unit (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - 1.26.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify module tidiness
        run: go mod tidy -diff

      - name: Vet
        run: go vet ./...

      - name: Lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.4.0 run ./...

      - name: Race tests
        run: go test -race ./...

      - name: Dependency hygiene
        shell: bash
        run: |
          set -euo pipefail

          if rg -n 'github.com/mattsp1290/local-symphony/internal/dispatcher|dispatcher\.ToolOutcome' --glob '*.go' .; then
            echo "forbidden dispatcher reference in Go source" >&2
            exit 1
          fi

          if rg -n '"(github.com/cloudwego/eino-ext[^"]*|go\.opentelemetry\.io/[^"]*|log|log/slog|[^"]*/auth[^"]*)"' --glob '*.go' .; then
            echo "forbidden telemetry/log/auth import in Go source" >&2
            exit 1
          fi

          for pkg in ./result ./fileops ./tracker; do
            imports="$(go list -f '{{join .Imports "\n"}}' "$pkg")"
            if grep -E '^os/exec$' <<<"$imports"; then
              echo "forbidden os/exec import in $pkg" >&2
              exit 1
            fi
          done

          for pkg in ./result ./fileops ./search ./shell ./tracker ./trackerwrite; do
            deps="$(go list -f '{{if not .Standard}}{{.ImportPath}}{{end}}' -deps "$pkg")"
            if grep -E 'local-symphony|internal/dispatcher|eino-ext|otel|slog|^log$|beads-go' <<<"$deps"; then
              echo "forbidden dependency in $pkg" >&2
              exit 1
            fi
          done

          tracker_beads_deps="$(go list -f '{{if not .Standard}}{{.ImportPath}}{{end}}' -deps ./tracker/beads)"
          if ! grep -q '^github.com/mattsp1290/beads-go/beads$' <<<"$tracker_beads_deps"; then
            echo "tracker/beads does not import beads-go SDK" >&2
            exit 1
          fi
          if grep -E 'local-symphony|internal/dispatcher|eino-ext|otel|slog|^log$' <<<"$tracker_beads_deps"; then
            echo "forbidden dependency in ./tracker/beads" >&2
            exit 1
          fi

  tracker-beads-integration:
    name: Tracker Beads Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install bd
        run: env -u CI npm install -g @beads/bd@1.0.4

      - name: Verify bd
        run: bd --version

      - name: Integration tests
        run: go test -tags=integration ./tracker/beads/...
